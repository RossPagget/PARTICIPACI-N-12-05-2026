{% extends 'base.html' %}

{% block title %}Editar Médico - Gestión Clínica{% endblock %}

{% block content %}

<!-- Cabecera de la sección -->
<div class="d-flex align-items-center mb-4">
    <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-3 me-3">
        <i class="fa-solid fa-user-pen fa-2x"></i>
    </div>
    <div>
        <h2 class="mb-0 fw-bold text-dark">Editar Médico</h2>
        <p class="text-muted mb-0">Modifica la información del profesional seleccionado.</p>
    </div>
</div>

<!-- Tarjeta contenedora del formulario -->
<div class="card border-0 shadow-sm rounded-3 max-width-form" style="max-width: 600px;">
    <div class="card-body p-4">
        
        <form method="POST">
            
            <!-- Campo: Nombre -->
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Nombre Completo:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="nombre" class="form-control border-start-0 ps-0" value="{{ medico.nombre }}" required>
                </div>
            </div>

            <!-- Campo: Especialidad -->
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Especialidad:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0">
                        <i class="fa-solid fa-stethoscope"></i>
                    </span>
                    <input type="text" name="especialidad" class="form-control border-start-0 ps-0" value="{{ medico.especialidad }}" required>
                </div>
            </div>

            <!-- Campo: Teléfono -->
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Teléfono de Contacto:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="text" name="telefono" class="form-control border-start-0 ps-0" value="{{ medico.telefono }}" required>
                </div>
            </div>

            <!-- Campo: Correo -->
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary">Correo Electrónico:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="correo" class="form-control border-start-0 ps-0" value="{{ medico.correo }}" required>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="d-flex gap-2 justify-content-end">
                <a href="/medicos" class="btn btn-light px-4">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-custom-primary shadow-sm px-4">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Actualizar
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
