<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clínica Médica</title>

    <style>

        body{
            font-family: Arial;
            margin:40px;
            background:#f4f4f4;
        }

        nav a{
            margin-right:15px;
            text-decoration:none;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ccc;
            padding:10px;
        }

        th{
            background:#007bff;
            color:white;
        }

        .btn{
            padding:8px;
            background:#007bff;
            color:white;
            text-decoration:none;
        }

    </style>

</head>
<body>

    <h1>Sistema de Gestión Clínica</h1>

    <nav>
        <a href="/">Inicio</a>
        <a href="/medicos">Médicos</a>
        <a href="/pacientes">Pacientes</a>
        <a href="/consultas">Consultas</a>
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
