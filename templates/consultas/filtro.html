{% extends 'base.html' %}

{% block content %}

<h2>Filtro por Fecha</h2>

<form method="POST">

<input type="date" name="fecha">

<button type="submit">
Buscar
</button>

</form>

<br>

<table>

<tr>
<th>Fecha</th>
<th>Paciente</th>
<th>Médico</th>
<th>Diagnóstico</th>
</tr>

{% for c in consultas %}

<tr>

<td>{{ c.fecha }}</td>
<td>{{ c.paciente.nombre }}</td>
<td>{{ c.medico.nombre }}</td>
<td>{{ c.diagnostico }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
