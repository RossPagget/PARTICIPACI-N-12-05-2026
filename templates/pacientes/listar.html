{% extends 'base.html' %}

{% block content %}

<h2>Lista de Pacientes</h2>

<a href="/pacientes/agregar" class="btn">
Nuevo Paciente
</a>

<br><br>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Edad</th>
<th>Dirección</th>
<th>Teléfono</th>
</tr>

{% for p in pacientes %}

<tr>

<td>{{ p.id_paciente }}</td>
<td>{{ p.nombre }}</td>
<td>{{ p.edad }}</td>
<td>{{ p.direccion }}</td>
<td>{{ p.telefono }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
